<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmed - Maison</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            background: url('https://images.unsplash.com/photo-1618220179428-22790b461013?q=80&w=1920') no-repeat center center fixed;
            background-size: cover; display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        .success-card {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); padding: 60px 40px;
            border-radius: 4px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1); border: 1px solid rgba(214, 175, 55, 0.2);
            max-width: 450px; width: 90%; text-align: center;
        }
        .success-icon { font-size: 40px; color: #d4af37; margin-bottom: 25px; }
        h2 { font-family: 'Cinzel', serif; font-size: 2rem; color: #111; margin: 0 0 15px 0; letter-spacing: 2px; }
        p { font-size: 0.95rem; letter-spacing: 1px; color: #555; line-height: 1.6; margin-bottom: 40px; }
        .btn-home {
            font-family: 'Montserrat', sans-serif; text-transform: uppercase; font-size: 0.8rem; font-weight: 500;
            letter-spacing: 2px; padding: 15px 35px; border: 1px solid #111; background-color: #111; color: #ffffff;
            text-decoration: none; display: inline-block; transition: all 0.4s ease;
        }
        .btn-home:hover { background-color: transparent; color: #111; border-color: #d4af37; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✦</div>
        <h2>Thank You</h2>
        <p>Your appointment has been successfully reserved.<br>We look forward to welcoming you at Maison.</p>
        <a href="/" class="btn-home">Return Home</a>
    </div>
</body>
</html>
